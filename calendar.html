<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#120B26" />
    <title>Calendar • Banabells Task</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/animation.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body class="min-h-full bg-aurora text-slate-100" data-page="calendar">
    <div
      class="mx-auto flex min-h-screen max-w-6xl flex-col px-4 pb-24 pt-4 sm:px-6"
    >
      <header
        class="mb-4 rounded-[28px] border border-white/10 bg-white/10 p-4 shadow-[0_20px_60px_rgba(0,0,0,0.25)] backdrop-blur-xl"
      >
        <p class="text-sm text-slate-400">Calendar</p>
        <h1 class="text-2xl font-semibold">Your flow map</h1>
      </header>

      <section
        class="rounded-[24px] border border-white/10 bg-white/10 p-4 backdrop-blur-xl"
      >
        <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
      </section>

      <section
        class="mt-4 rounded-[24px] border border-white/10 bg-white/10 p-4 backdrop-blur-xl"
      >
        <div class="mb-3 flex items-center justify-between">
          <h2 class="text-lg font-semibold">Agenda</h2>
          <span id="selectedDateLabel" class="text-sm text-slate-400"
            >Today</span
          >
        </div>
        <div id="calendarAgenda" class="space-y-2"></div>
      </section>
    </div>

    <nav class="bottom-nav" aria-label="Bottom navigation">
      <a class="nav-item" href="index.html">⌂</a>
      <a class="nav-item active" href="calendar.html">◷</a>
      <a class="nav-item" href="statistics.html">◔</a>
      <a class="nav-item" href="settings.html">⚙</a>
    </nav>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
