<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#120B26" />
    <title>Settings • Vanta Tasks</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/animation.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
  </head>
  <body class="min-h-full bg-aurora text-slate-100" data-page="settings">
    <div
      class="mx-auto flex min-h-screen max-w-6xl flex-col px-4 pb-24 pt-4 sm:px-6"
    >
      <header
        class="mb-4 rounded-[28px] border border-white/10 bg-white/10 p-4 shadow-[0_20px_60px_rgba(0,0,0,0.25)] backdrop-blur-xl"
      >
        <p class="text-sm text-slate-400">Settings</p>
        <h1 class="text-2xl font-semibold">Make it yours</h1>
      </header>

      <section class="space-y-3">
        <div
          class="rounded-[24px] border border-white/10 bg-white/10 p-4 backdrop-blur-xl"
        >
          <div class="flex items-center justify-between">
            <div>
              <p class="font-semibold">Dark mode</p>
              <p class="text-sm text-slate-400">Always on, premium contrast</p>
            </div>
            <button
              id="themeToggle"
              class="rounded-full bg-violet-500 px-3 py-2 text-sm"
            >
              On
            </button>
          </div>
        </div>
        <div
          class="rounded-[24px] border border-white/10 bg-white/10 p-4 backdrop-blur-xl"
        >
          <div class="flex items-center justify-between">
            <div>
              <p class="font-semibold">Notifications</p>
              <p class="text-sm text-slate-400">
                Smart reminders and focus nudges
              </p>
            </div>
            <button
              id="notifToggle"
              class="rounded-full border border-white/10 bg-white/10 px-3 py-2 text-sm"
            >
              On
            </button>
          </div>
        </div>
        <div
          class="rounded-[24px] border border-white/10 bg-white/10 p-4 backdrop-blur-xl"
        >
          <button
            id="resetBtn"
            class="w-full rounded-2xl border border-rose-400/30 bg-rose-500/10 px-4 py-3 text-left text-sm font-semibold text-rose-300"
          >
            Reset app data
          </button>
        </div>
      </section>
    </div>

    <nav class="bottom-nav" aria-label="Bottom navigation">
      <a class="nav-item" href="index.html">⌂</a>
      <a class="nav-item" href="calendar.html">◷</a>
      <a class="nav-item" href="statistics.html">◔</a>
      <a class="nav-item active" href="settings.html">⚙</a>
    </nav>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
